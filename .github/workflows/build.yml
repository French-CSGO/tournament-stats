name: Build & Push Docker Images

on:
  push:
    branches: [master, dev]
    paths-ignore:
      - "setup/**"
      - "*.md"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: french-csgo

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/tournament-stats-backend:${{ github.ref_name == 'master' && 'latest' || github.ref_name }}
          cache-from: type=gha,scope=backend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=backend-${{ github.ref_name }}

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/tournament-stats-frontend:${{ github.ref_name == 'master' && 'latest' || github.ref_name }}
          cache-from: type=gha,scope=frontend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ github.ref_name }}
